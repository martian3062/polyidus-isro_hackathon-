{% extends "frontend/base.html" %}
{% block title %}Context Graph{% endblock %}
{% block page_title %}Context Graph{% endblock %}
{% block main_class %}{% endblock %}
{% block extra_head %}
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
#graph-wrap{position:relative;width:100%;height:100%;}
#graph-svg{width:100%;height:100%;}
.node-label{font-size:10px;fill:#94a3b8;pointer-events:none;}
.link{stroke-opacity:.4;stroke-width:1.5;}
.node circle{cursor:pointer;transition:r .15s;}
.node:hover circle{r:14;}
#tooltip{position:absolute;background:rgba(12,22,40,.9);border:1px solid rgba(45,212,191,.25);border-radius:10px;padding:10px 14px;font-size:11px;pointer-events:none;z-index:100;display:none;min-width:160px;}
</style>
{% endblock %}
{% block content %}
<div id="graph-wrap">
  <svg id="graph-svg"></svg>
  <div id="tooltip"></div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
const NODES=[
  {id:'P1',label:'Perceiver-1',domain:'telecom',color:'#2dd4bf',role:'perceiver'},
  {id:'Pl1',label:'Planner-1',domain:'telecom',color:'#2dd4bf',role:'planner'},
  {id:'R1',label:'Recoverer-1',domain:'telecom',color:'#2dd4bf',role:'recoverer'},
  {id:'G1',label:'Guardian-1',domain:'telecom',color:'#2dd4bf',role:'guardian'},
  {id:'P2',label:'Perceiver-2',domain:'cloud',color:'#60a5fa',role:'perceiver'},
  {id:'Pl2',label:'Planner-2',domain:'cloud',color:'#60a5fa',role:'planner'},
  {id:'R2',label:'Recoverer-2',domain:'cloud',color:'#60a5fa',role:'recoverer'},
  {id:'G2',label:'Guardian-2',domain:'cloud',color:'#60a5fa',role:'guardian'},
  {id:'P3',label:'Perceiver-3',domain:'icu',color:'#f472b6',role:'perceiver'},
  {id:'Pl3',label:'Planner-3',domain:'icu',color:'#f472b6',role:'planner'},
  {id:'R3',label:'Recoverer-3',domain:'icu',color:'#f472b6',role:'recoverer'},
  {id:'G3',label:'Guardian-3',domain:'icu',color:'#f472b6',role:'guardian'},
  {id:'BUS',label:'A2A Bus',domain:'system',color:'#a78bfa',role:'bus'},
];
const LINKS=[
  {s:'P1',t:'Pl1',w:3},{s:'Pl1',t:'R1',w:3},{s:'G1',t:'P1',w:2},
  {s:'P2',t:'Pl2',w:3},{s:'Pl2',t:'R2',w:3},{s:'G2',t:'P2',w:2},
  {s:'P3',t:'Pl3',w:3},{s:'Pl3',t:'R3',w:3},{s:'G3',t:'P3',w:2},
  {s:'BUS',t:'P1',w:1},{s:'BUS',t:'P2',w:1},{s:'BUS',t:'P3',w:1},
  {s:'BUS',t:'G1',w:1},{s:'BUS',t:'G2',w:1},{s:'BUS',t:'G3',w:1},
];

const svg=d3.select('#graph-svg');
const wrap=document.getElementById('graph-wrap');
const W=()=>wrap.clientWidth, H=()=>wrap.clientHeight;

const sim=d3.forceSimulation(NODES)
  .force('link',d3.forceLink(LINKS.map(l=>({source:NODES.find(n=>n.id===l.s),target:NODES.find(n=>n.id===l.t),w:l.w}))).distance(100).strength(.8))
  .force('charge',d3.forceManyBody().strength(-400))
  .force('center',d3.forceCenter(W()/2,H()/2))
  .force('collision',d3.forceCollide(40));

const link=svg.append('g').selectAll('line').data(LINKS).enter().append('line')
  .attr('class','link').attr('stroke',d=>{const n=NODES.find(x=>x.id===d.s);return n?n.color:'#2dd4bf';});

const node=svg.append('g').selectAll('.node').data(NODES).enter().append('g').attr('class','node')
  .call(d3.drag().on('start',(ev,d)=>{if(!ev.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(ev,d)=>{d.fx=ev.x;d.fy=ev.y;})
    .on('end',(ev,d)=>{if(!ev.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

node.append('circle').attr('r',11).attr('fill',d=>d.color+'22').attr('stroke',d=>d.color).attr('stroke-width',2);
node.append('text').attr('class','node-label').attr('dy',26).attr('text-anchor','middle').text(d=>d.label);

const tip=document.getElementById('tooltip');
node.on('mouseover',(ev,d)=>{
  tip.innerHTML=`<div style="color:${d.color};font-weight:600;margin-bottom:4px">${d.label}</div>
    <div style="color:#94a3b8">Domain: ${d.domain}</div>
    <div style="color:#94a3b8">Role: ${d.role}</div>`;
  tip.style.display='block';
  tip.style.left=(ev.offsetX+12)+'px';tip.style.top=(ev.offsetY-10)+'px';
}).on('mouseout',()=>tip.style.display='none');

sim.on('tick',()=>{
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('transform',d=>`translate(${d.x},${d.y})`);
});

// ── Drill animation ─────────────────────────────────────────────────────────
const DOMAIN_MAP={telecom:'telecom','5g':'telecom',cloud:'cloud',icu:'icu',edge:'network',network:'network'};

function pulseNodes(domain,steps){
  // steps: array of role strings in order
  const roleOrder={'perceiver':0,'planner':1,'recoverer':2,'guardian':3,'bus':2};
  steps.forEach((role,i)=>{
    setTimeout(()=>{
      node.filter(d=>d.domain===domain&&d.role===role)
        .select('circle')
        .transition().duration(200).attr('r',20).attr('fill',d=>d.color+'66')
        .transition().duration(400).attr('r',11).attr('fill',d=>d.color+'22');
      link.filter(d=>d.source.domain===domain||d.target.domain===domain)
        .transition().duration(300)
        .attr('stroke-opacity',.9).attr('stroke-width',4)
        .transition().duration(600)
        .attr('stroke-opacity',.4).attr('stroke-width',1.5);
    }, i*700);
  });
}

function checkDrillStorage(){
  try{
    const raw=localStorage.getItem('overlay_last_drill');
    if(!raw)return;
    const parsed=JSON.parse(raw);
    const age=Date.now()-parsed.ts;
    if(age<30000){
      const dom=DOMAIN_MAP[parsed.domain]||parsed.domain;
      pulseNodes(dom,['perceiver','planner','recoverer','guardian']);
      // also pulse the BUS node
      setTimeout(()=>{
        node.filter(d=>d.role==='bus').select('circle')
          .transition().duration(300).attr('r',18).attr('fill','rgba(167,139,250,.4)')
          .transition().duration(500).attr('r',11).attr('fill','rgba(167,139,250,.15)');
      },500);
    }
  }catch(e){}
}
setInterval(checkDrillStorage,2000);
checkDrillStorage();
</script>
{% endblock %}
