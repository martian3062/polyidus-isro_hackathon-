global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "overlay-backend"
    static_configs:
      - targets: ["backend:8000"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]
